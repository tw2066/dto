name: PHPUnit

on: [ push, pull_request ]

jobs:
  ci:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        hyperf-di:
          - "3.2"
#          - "3.1"
        hyperf-version:
          - "8.1-alpine-v3.19-swoole"
          - "8.2-alpine-v3.22-swoole"
          - "8.3-alpine-v3.23-swoole"
          - "8.4-alpine-v3.23-swoole"
      fail-fast: false
      max-parallel: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Pull Hyperf Image
        run: docker pull hyperf/hyperf:${{ matrix.hyperf-version }}
      - name: Environment Info
        run: |
          docker run --rm hyperf/hyperf:${{ matrix.hyperf-version }} \
            sh -c "php -v && php -m && php --ri swoole && composer -V"
      - name: Composer Update
        if: matrix.hyperf-version == '3.2' && matrix.hyperf-version != '8.1-alpine-v3.11-swoole'
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app -w /app hyperf/hyperf:${{ matrix.hyperf-version }} \
            sh -c "composer require hyperf/di:${{ matrix.hyperf-di }} && composer update -o"
      - name: Composer Analyse
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app -w /app hyperf/hyperf:${{ matrix.hyperf-version }} \
            sh -c "composer analyse"
      - name: Run Unit Tests
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app -w /app hyperf/hyperf:${{ matrix.hyperf-version }} \
            sh -c "composer test"
