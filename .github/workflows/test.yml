name: PHPUnit

on: [ push, pull_request ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # 定义要测试的 Hyperf 官方镜像版本
        hyperf-version:
          - "8.1-alpine-v3.19-swoole"
          - "8.2-alpine-v3.22-swoole"
          - "8.3-alpine-v3.23-swoole"
          - "8.4-alpine-v3.23-swoole"
      fail-fast: false
      max-parallel: 5

    steps:
      - name: 检出代码
        uses: actions/checkout@v4
      - name: 拉取 Hyperf 镜像
        run: docker pull hyperf/hyperf:${{ matrix.hyperf-version }}
      - name: php版本信息
        run: |
          docker run --rm hyperf/hyperf:${{ matrix.hyperf-version }} sh -c "php -v && php -m && php --ri swoole"
      - name: 运行单元测试
        run: |
          docker run --rm \
            -v ${{ github.workspace }}:/app \
            -w /app \
            hyperf/hyperf:${{ matrix.hyperf-version }} \
            sh -c "composer install --no-progress && composer test"